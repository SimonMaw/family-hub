  bedtime:     { label: "🌙 Bedtime",      items: [["7:00","Bath or shower 🚿"],["7:20","Pyjamas & teeth 😁"],["7:30","Story with Mum or Dad 📖"],["7:50","Lights out — Lila 🌙"],["8:15","Lights out — Ollie 🌙"]] },

function stored(key, def) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : def; } catch { return def; }
}

function Confetti({ active }) {
  if (!active) return null;
  const pieces = ["🌟","✨","🎉","⭐","🎊","💫"];
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      {Array.from({length:18}).map((_,i) => (
        <div key={i} style={{
          position:"absolute", left:`${5 + (i*5.5) % 92}%`, top:"-20px",
          fontSize: 18 + (i%3)*6,
          animation:`confetti ${0.8 + (i%4)*0.2}s ease-out ${(i%5)*0.08}s forwards`
        }}>{pieces[i%pieces.length]}</div>
      ))}
    </div>
  );
}

function App() {
  const [tab, setTab]               = useState(0);
  const [stars, setStars]           = useState(() => stored("fh_stars2", {ollie:[],lila:[]}));

  useEffect(() => { localStorage.setItem("fh_notes2", JSON.stringify(notes)); }, [notes]);

    setAddingFor(null);
    setConfetti(true);

  const starsInBlock   = (kidId) => stars[kidId].length % REWARD_AT;
  const totalRewards   = (kidId) => Math.floor(stars[kidId].length / REWARD_AT);

    <div style={{minHeight:"100vh",paddingBottom:72}}>
      <Confetti active={confetti} />
      <div style={{background:"linear-gradient(135deg,#1b5e20,#33691e,#558b2f)",padding:"18px 16px 14px",textAlign:"center",boxShadow:"0 4px 20px rgba(27,94,32,0.35)"}}>
        <div style={{fontSize:30,marginBottom:4,letterSpacing:4}}>🌿🦊🦋🌿</div>
        <h1 style={{color:"#fff",fontSize:22,fontWeight:900,margin:0,letterSpacing:0.5,textShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>Our Family Hub</h1>
        <p style={{color:"rgba(255,255,255,0.75)",fontSize:12,margin:"4px 0 0"}}>Ollie & Lila's rules, stars & routines</p>

        {TABS.map((t,i) => (
          <button key={i} onClick={()=>setTab(i)} style={{flex:"0 0 auto",padding:"12px 13px",border:"none",background:"none",cursor:"pointer",fontSize:11,fontWeight:800,color:tab===i?"#2e7d32":"#999",whiteSpace:"nowrap",borderBottom:tab===i?"3px solid #2e7d32":"3px solid transparent",transition:"all 0.18s"}}>{t}</button>
        ))}
      </div>
      <div style={{padding:"16px 14px 20px"}} className="slide-up">
        {tab===0 && (<div><p style={{textAlign:"center",color:"#666",fontSize:13,marginBottom:16}}>Earn <strong style={{color:"#F9A825"}}>{REWARD_AT} ⭐</strong> stars to unlock a reward!</p>{KIDS.map(kid => { const count = starsInBlock(kid.id); const rewards = totalRewards(kid.id); return (<div key={kid.id} style={{background:"#fff",borderRadius:22,padding:18,marginBottom:16,boxShadow:"0 3px 16px rgba(0,0,0,0.09)",border:`2px solid ${kid.light}`}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:46,height:46,borderRadius:"50%",background:kid.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:`0 2px 8px ${kid.color}44`}}>{kid.emoji}</div><div><div style={{fontWeight:900,fontSize:19,color:kid.dark}}>{kid.name}</div><div style={{fontSize:11,color:"#aaa"}}>Age {kid.age} · {stars[kid.id].length} stars total · {rewards} 🏆</div></div></div><button onClick={()=>setMgmtKid(mgmtKid===kid.id?null:kid.id)} style={{background:"#f5f5f5",border:"none",borderRadius:8,padding:"5px 9px",fontSize:13,cursor:"pointer",color:"#777"}}>⚙️</button></div><div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:10}}>{Array.from({length:REWARD_AT}).map((_,i) => (<span key={i} style={{fontSize:30,filter:i<count?"none":"grayscale(1) opacity(0.2)",transition:"all 0.3s",display:"block"}}>⭐</span>))}</div><p style={{textAlign:"center",fontSize:13,color:"#777",marginBottom:14}}>{count===0?"No stars yet this round — let's earn some!":count===REWARD_AT?"🎉 Reward ready!":`${REWARD_AT-count} more star${REWARD_AT-count!==1?"s":""} to go!`}</p>{addingFor!==kid.id?(<button onClick={()=>setAddingFor(kid.id)} style={{width:"100%",padding:"13px",background:`linear-gradient(135deg,${kid.color},${kid.dark})`,color:"#fff",border:"none",borderRadius:14,fontSize:15,fontWeight:800,cursor:"pointer",boxShadow:`0 4px 14px ${kid.color}55`}}>+ Add a Star ⭐</button>):(<div><p style={{fontWeight:800,fontSize:13,color:"#444",marginBottom:8}}>What did {kid.name} do well? 🌟</p><div style={{display:"flex",flexDirection:"column",gap:7}}>{STAR_REASONS.map((r,i) => (<button key={i} onClick={()=>addStar(kid.id,r)} style={{padding:"11px 14px",background:kid.light,border:`1.5px solid ${kid.color}66`,borderRadius:12,fontSize:13,textAlign:"left",cursor:"pointer",color:"#333",fontFamily:"inherit",fontWeight:600}}>{r}</button>))}</div><button onClick={()=>setAddingFor(null)} style={{marginTop:8,width:"100%",padding:"9px",background:"none",border:"1px solid #e0e0e0",borderRadius:12,fontSize:13,color:"#aaa",cursor:"pointer",fontFamily:"inherit"}}>Cancel</button></div>)}{mgmtKid===kid.id&&(<div style={{display:"flex",gap:8,marginTop:10}}><button onClick={()=>removeLastStar(kid.id)} style={{flex:1,padding:"9px",background:"#fff3e0",border:"1px solid #ffcc80",borderRadius:10,fontSize:12,color:"#e65100",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Remove Last ⭐</button><button onClick={()=>resetStars(kid.id)} style={{flex:1,padding:"9px",background:"#ffebee",border:"1px solid #ef9a9a",borderRadius:10,fontSize:12,color:"#c62828",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Reset All Stars</button></div>)}{stars[kid.id].length>0&&addingFor!==kid.id&&(<div style={{marginTop:14,borderTop:"1px solid #f0f0f0",paddingTop:10}}><p style={{fontSize:11,fontWeight:800,color:"#bbb",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Recent</p>{[...stars[kid.id]].reverse().slice(0,3).map((s,i)=>(<div key={i} style={{fontSize:12,color:"#666",padding:"4px 0",display:"flex",justifyContent:"space-between"}}><span>⭐ {s.reason}</span><span style={{color:"#ccc"}}>{s.date}</span></div>))}</div>)}</div>); })}</div>)}

        {tab===2 && (<div><div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:40,marginBottom:6}}>🚨</div><h2 style={{color:"#2e7d32",fontSize:21,fontWeight:900,marginBottom:4}}>What Happens Next</h2><p style={{color:"#888",fontSize:13}}>What we do when a rule is broken — every time, no exceptions.</p></div>{CONSEQUENCE_LADDER.map((item,i)=>(<div key={i} style={{background:item.bg,borderRadius:16,padding:"14px 18px",marginBottom:11,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderLeft:`4px solid ${item.color}`,display:"flex",alignItems:"flex-start",gap:14}}><div style={{fontSize:26,minWidth:32,paddingTop:2}}>{item.icon}</div><div><div style={{fontWeight:900,fontSize:15,color:item.color,marginBottom:3}}>{item.label}</div><div style={{fontSize:14,color:"#555",lineHeight:1.4}}>{item.desc}</div></div></div>))}<div style={{background:"#fff3e0",borderRadius:16,padding:16,marginTop:6}}><p style={{fontWeight:900,fontSize:13,color:"#e65100",marginBottom:6}}>⚡ Mum & Dad's rule:</p><p style={{fontSize:13,color:"#555",lineHeight:1.5,margin:0}}>Say it <strong>once</strong>, calmly. Follow through <strong>every single time</strong>. A low, steady voice is more powerful than shouting.</p></div></div>)}
        {tab===3 && (<div><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:40,marginBottom:6}}>🗓️</div><h2 style={{color:"#2e7d32",fontSize:21,fontWeight:900,marginBottom:4}}>Daily Routine</h2><p style={{color:"#888",fontSize:13}}>Knowing what comes next helps everyone feel safe.</p></div><div style={{display:"flex",gap:7,marginBottom:16}}>{Object.entries(ROUTINES).map(([key,val])=>(<button key={key} onClick={()=>setRoutineTab(key)} style={{flex:1,padding:"10px 4px",border:"none",borderRadius:13,cursor:"pointer",fontFamily:"inherit",background:routineTab===key?"#2e7d32":"#fff",color:routineTab===key?"#fff":"#666",fontWeight:800,fontSize:10.5,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",transition:"all 0.18s"}}>{val.label}</button>))}</div><div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 3px 14px rgba(0,0,0,0.08)"}}>{ROUTINES[routineTab].items.map(([time,task],i,arr)=>(<div key={i} style={{display:"flex",alignItems:"center",padding:"14px 18px",borderBottom:i<arr.length-1?"1px solid #f5f5f5":"none",gap:14,background:i%2===0?"#fff":"#fafafa"}}><div style={{background:"#e8f5e9",color:"#2e7d32",fontWeight:900,fontSize:12,padding:"5px 9px",borderRadius:9,minWidth:46,textAlign:"center",flexShrink:0}}>{time}</div><div style={{fontSize:15,color:"#2e3a2e",fontWeight:600}}>{task}</div></div>))}</div></div>)}
        {tab===4 && (<div><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:40,marginBottom:6}}>📝</div><h2 style={{color:"#2e7d32",fontSize:21,fontWeight:900,marginBottom:4}}>Parent Notes</h2><p style={{color:"#888",fontSize:13}}>For you and Beth — patterns, wins & things to work on.</p></div><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. Lila gave Ollie a hug without being asked today — amazing!..." style={{width:"100%",minHeight:200,padding:16,border:"2px solid #e8e8e8",borderRadius:16,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",lineHeight:1.7,color:"#333",background:"#fff"}} /><div style={{background:"#e8f5e9",borderRadius:16,padding:16,marginTop:12}}><p style={{fontWeight:900,fontSize:13,color:"#2e7d32",marginBottom:8}}>💡 Evening check-in:</p>{["Did we follow through on consequences consistently?","Did we do 10 mins 1:1 with each child?","Did we contradict each other in front of the kids?","What went well today that we can build on?","What do we want to do differently tomorrow?"].map((q,i)=>(<p key={i} style={{fontSize:13,color:"#555",margin:"4px 0",lineHeight:1.5}}>• {q}</p>))}</div></div>)}
      </div>
      {rewardKid && (()=>{ const kid = KIDS.find(k=>k.id===rewardKid); return (<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={()=>setRewardKid(null)}><div style={{background:"#fff",borderRadius:26,padding:30,textAlign:"center",maxWidth:320,width:"100%",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:60,marginBottom:8}}>🎉</div><h2 style={{color:kid.dark,fontSize:24,fontWeight:900,margin:"0 0 6px"}}>{kid.name} did it!</h2><p style={{color:"#666",fontSize:15,marginBottom:20,lineHeight:1.5}}>You earned <strong style={{color:kid.color}}>{REWARD_AT} stars</strong>!<br/>Time to pick your reward!</p><div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>{REWARDS.map((r,i)=>(<div key={i} style={{padding:"11px 16px",background:kid.light,borderRadius:13,fontSize:14,color:kid.dark,fontWeight:700,textAlign:"left"}}>{r}</div>))}</div><button onClick={()=>setRewardKid(null)} style={{width:"100%",padding:14,background:`linear-gradient(135deg,${kid.color},${kid.dark})`,color:"#fff",border:"none",borderRadius:14,fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Woohoo! Let's celebrate! 🎊</button></div></div>); })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
